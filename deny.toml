# cargo-deny configuration for carapace.
#
# The license allowlist is tailored to carapace's actual dependency tree
# (verify with `cargo metadata`). Adding a dependency whose license is not
# listed here fails CI by design — a deliberate prompt to review the new
# license before accepting it.

[licenses]
allow = [
    "Apache-2.0",   # this crate + many deps
    "MIT",          # many deps (dual MIT/Apache)
    "Unicode-3.0",  # required by the `unicode-ident` family (AND expression)
]
confidence-threshold = 0.8

[advisories]
version = 2
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path deps carry no version; don't flag them as wildcards.
allow-wildcard-paths = true

[sources]
# carapace depends only on crates.io packages.
unknown-registry = "deny"
unknown-git = "deny"
